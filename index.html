<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Presupuestos Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen font-sans">

            </div>
            
            <div class="py-4">
                <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto text-4xl shadow-inner">
                    🔒
                </div>
            </div>

            <button id="btn-login" class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-semibold py-3 px-4 rounded-xl shadow-md transition duration-200">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M23.745 12.27c0-.7-.06-1.4-.19-2.07H12v4.51h6.6c-.29 1.53-1.14 2.82-2.4 3.68v3.05h3.88c2.27-2.09 3.66-5.17 3.66-8.82z"/>

                    <path fill="#EA4335" d="M12 4.75c1.77 0 3.35.61 4.6 1.8l3.42-3.42C17.95 1.19 15.24 0 12 0 7.31 0 3.18 2.12 1.21 5.46l4.11 3.22c.94-2.85 3.57-4.93 6.68-4.93z"/>
                </svg>
                <span>Iniciar sesión con Google</span>
            </button>
            <p id="auth-loading" class="text-xs text-blue-200 hidden animate-pulse">Conectando con Firebase...</p>
        </div>
    </div>

            <div class="container mx-auto px-4 py-3 flex justify-between items-center">
                <div class="flex items-center space-x-2 cursor-pointer" id="nav-logo-btn">
                    <span class="text-xl font-bold tracking-wide">FacturaApp Cloud 💼</span>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="tab-btn-presupuesto" class="px-3 py-1.5 rounded font-medium hover:bg-blue-700 transition">Presupuesto</button>
                    <button id="tab-btn-inventario" class="px-3 py-1.5 rounded font-medium hover:bg-blue-700 transition">Inventario</button>
                    <button id="tab-btn-configuracion" class="p-2 rounded-full hover:bg-blue-700 transition" title="Configuración de la Empresa">

                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </button>
                    <button id="btn-logout" class="p-2 text-red-200 hover:text-white transition" title="Cerrar Sesión">
